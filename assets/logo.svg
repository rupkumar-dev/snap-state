<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060913" />
      <stop offset="100%" stop-color="#0D111A" />
    </linearGradient>

    <linearGradient id="snap⚡Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4500" />
      <stop offset="50%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>

    <linearGradient id="stateLayerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <g opacity="0.02" stroke="#FFFFFF" stroke-width="1.5">
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="250" x2="512" y2="250" />
    <line x1="0" y1="384" x2="512" y2="384" />
  </g>

  <g transform="translate(256, 256)">
    
    <path d="M -110,-100 L 70,-100" 
          fill="none" 
          stroke="url(#stateLayerGrad)" 
          stroke-width="24" 
          stroke-linecap="round" />
          
    <path d="M -70,100 L 110,100" 
          fill="none" 
          stroke="url(#stateLayerGrad)" 
          stroke-width="24" 
          stroke-linecap="round" />

    <circle cx="95" cy="-100" r="12" fill="#00F2FE" />
    <circle cx="-95" cy="100" r="12" fill="#00F2FE" />

    <path d="M 60,-150 
             L -100,10 
             L -20,10 
             L -60,150 
             L 100,-10 
             L 20,-10 Z" 
          fill="url(#snap⚡Grad)" 
          filter="url(#boltGlow)" />

  </g>
</svg>
